general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 2
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
    immediate_render = true
    pam_module = hyprlock
    text_trim = true
}

background {
    monitor =
    path = /home/wert/Pictures/Wallpapers/current.jpg
    blur_passes = 0
    blur_size = 0
    noise = 0.0117
    contrast = 0.9
    brightness = 1.0
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 255, 255, 0.15)
    inner_color = rgba(0, 0, 0, 0.35)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>输入密码...</i>
    hide_input = false
    rounding = 8
    check_color = rgba(255, 255, 255, 0.25)
    fail_color = rgba(235, 111, 146, 0.6)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000
    fail_transition = 300
    caps_lock_color = rgba(250, 179, 135, 0.7)
    num_lock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = HarmonyOS Sans SC Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 6
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.25)
    shadow_boost = 1.0
}

label {
    monitor =
    text = cmd[update:60000] date '+%m月%d日 %A'
    color = rgba(255, 255, 255, 0.85)
    font_size = 28
    font_family = HarmonyOS Sans SC
    position = 0, 90
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.2)
    shadow_boost = 1.0
}

animations {
    enabled = true

    bezier = easeOut, 0.25, 0.46, 0.45, 0.94

    animation = fadeIn, 1, 5, easeOut
    animation = fadeOut, 1, 5, easeOut
    animation = inputFieldDots, 1, 3, easeOut
    animation = inputFieldColors, 1, 3, easeOut
    animation = inputFieldWidth, 1, 3, easeOut
    animation = inputFieldFade, 1, 3, easeOut
}
