general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 2
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
    immediate_render = true
    pam_module = hyprlock
    text_trim = true
}

background {
    monitor =
    path = /home/wert/.local/share/bing-wallpaper/current.jpg
    blur_passes = 0
    blur_size = 0
    noise = 0.0117
    contrast = 0.9
    brightness = 1.0
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(33CCFE)
    inner_color = rgb(1f1d2e)
    font_color = rgb(e0def4)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>输入密码...</i>
    hide_input = false
    rounding = 10
    check_color = rgb(eb6f92)
    fail_color = rgb(31748f)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000
    fail_transition = 300
    caps_lock_color = rgb(fab387)
    num_lock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = HarmonyOS Sans SC Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.4)
    shadow_boost = 2.0
}

label {
    monitor =
    text = cmd[update:60000] date '+%m月%d日 %A'
    color = rgba(255, 255, 255, 0.85)
    font_size = 28
    font_family = HarmonyOS Sans SC
    position = 0, 90
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.3)
    shadow_boost = 1.5
}
