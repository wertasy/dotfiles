# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, preferred, auto, 1
monitor = HDMI-A-1, preferred, auto, 1
gesture = 3, horizontal, workspace
gesture = 3, down, mod: ALT, close
gesture = 3, up, scale: 1.5, fullscreen
# gesture = 3, down, scale: 1.5, fullscreen
# gesture = 3, left, scale: 1.5, float

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = waybar 
exec-once = swaync
# exec-once = hyprpaper 
exec-once = swww-daemon
exec-once = swww img ~/.local/share/bing-wallpaper/current.jpg
exec-once = foot
exec-once = onedrive --monitor
exec-once = hyprctl dispatch exec "[workspace 2] firefox"
exec-once = fcitx5
exec-once = keepassxc
exec-once = blueman-applet
exec-once = wl-paste --watch cliphist store
exec-once = hyprctl dispatch exec "[workspace 5] Telegram"
exec-once = hyprctl dispatch exec "[workspace 5] thunderbird"

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = foot
$fileManager = dolphin

# Some default env vars.
env = XCURSOR_SIZE,36
env = QT_CURSOR_SIZE,36
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR,1
env = QT_FONT_DPI,120
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,Adwaita:dark
env = XMODIFIERS,@im=fcitx 
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx 
env = SDL_IM_MODULE,fcitx 
env = GLFW_IM_MODULE,fcitx
env = LANGUAGE,zh_CN:zh
env = LC_ALL,zh_CN.UTF-8


# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 1
    gaps_out = 2
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    
    blur {
        enabled = true
        size = 5
        passes = 3
        ignore_opacity = false
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe_touch = true
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    focus_on_activate = yes
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
#device:epic-mouse-v1 {
#    sensitivity = -0.5
#}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#
#windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

bind = $mainMod, i, exec, pkill -SIGUSR2 waybar

#
# Mouse Toggle Floating
#

# `Super + <Mouse Middle Click>
bind = SUPER, mouse:274, togglefloating

# `Alt + <Mouse Middle Click>
bind = ALT, mouse:274, togglefloating

bind = ALT, F, fullscreen

# `Alt + <Mouse Left Click>
#bind = ALT, mouse:272, togglefloating

# `Alt + <Mouse Right Click>
#bind = ALT, mouse:273, togglefloating



#
# # Keybind / Window Control
#

bind = $mainMod, F, fullscreen, 1

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, pkill waybar && waybar
bind = $mainMod, W, exec, firefox
bind = $mainMod, M, exit,
bind = $mainMod, C, killactive, 
bind = $mainMod, Q, killactive, 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, K, togglespecialworkspace, magic
bind = $mainMod SHIFT, K, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Swap window
bind = $mainMod CTRL ALT, up, swapwindow, u
bind = $mainMod CTRL ALT, down, swapwindow, d
bind = $mainMod CTRL ALT, left, swapwindow, l
bind = $mainMod CTRL ALT, right, swapwindow, r

# Resize window
binde = $mainMod ALT, up, resizeactive, 0 -5%
binde = $mainMod ALT, down, resizeactive, 0 5%
binde = $mainMod ALT, left, resizeactive, -5% 0
binde = $mainMod ALT, right, resizeactive, 5% 0

# fuzzel 按键绑定
bind = $mainMod, SPACE, exec, fuzzel

# 截屏
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy

# Switch workspaces with `Alt + [a,s]`
bind = $mainMod CTRL, left, workspace, -1
bind = $mainMod CTRL, right, workspace, +1

binde = $mainMod SHIFT, left, movetoworkspace, -1
binde = $mainMod SHIFT, right, movetoworkspace, +1


#
# # Keybind / Volume Control
#
#
# * https://man.archlinux.org/man/amixer.1.en
# * https://archlinux.org/packages/extra/x86_64/alsa-utils/
# * https://wiki.archlinux.org/title/Advanced_Linux_Sound_Architecture
# * https://www.alsa-project.org/wiki/Main_Page
#

bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle && toastify send -t 1500 -c Volume Volume "$(pactl get-sink-mute @DEFAULT_SINK@ | cut -d' ' -f 2 | sed -e 's/yes//' -e 's/no//')  $(pactl get-sink-volume @DEFAULT_SINK@ | awk '{print $5}')"  123
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% && toastify send -t 1500 -c Volume Volume "$(pactl get-sink-mute @DEFAULT_SINK@ | cut -d' ' -f 2 | sed -e 's/yes//' -e 's/no//')  $(pactl get-sink-volume @DEFAULT_SINK@ | awk '{print $5}')"  123
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% && toastify send -t 1500 -c Volume Volume "$(pactl get-sink-mute @DEFAULT_SINK@ | cut -d' ' -f 2 | sed -e 's/yes//' -e 's/no//')  $(pactl get-sink-volume @DEFAULT_SINK@ | awk '{print $5}')"  123
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous

#
# # Keybind / Monitor Brightness Control
#
#
# * https://man.archlinux.org/man/community/brightnessctl/brightnessctl.1.en
# * https://archlinux.org/packages/community/x86_64/brightnessctl/
# * https://github.com/Hummer12007/brightnessctl
#

bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%

# 绑定电源键到 suspend 命令
bind = , XF86PowerOff, exec, systemctl suspend

bind = $mainMod, L, exec, hyprlock

# bind = $mainMod, N, exec, find /tmp/bing-wallpaper -type f \( -name "*.jpg" -o -name "*.png" \) | shuf -n 1 | xargs hyprctl hyprpaper wallpaper ,

bind = $mainMod, H, exec, cliphist list | fuzzel --dmenu --prompt='cliplist: ' | cliphist decode | wl-copy

